version: '3.8'

services:
  app:
    build: .
    ports:
      - "3005:3005"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    command: >
      sh -c "node dist/scripts/run-migrations.js && node dist/main"
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WAHA_API_URL=http://waha:3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - edufusion-network

  redis:
    image: redis:alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


networks:
  edufusion-network:
    driver: bridge
